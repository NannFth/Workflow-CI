name: MLflow CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting CI job"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=./mlruns" >> $GITHUB_ENV

      - name: Run mlflow project
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local --experiment-name "California Housing Price Prediction - CI" | tee mlflow_run_output.log

      - name: Get latest MLflow run_id
        working-directory: MLProject
        run: |
          RUN_ID=$(grep -oP "(?<=Running command 'python modelling.py' in run with ID ')[a-f0-9]+" mlflow_run_output.log | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip

      - name: Upload to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "MLProject/mlruns" ]; then git add -f MLProject/mlruns; fi
          if [ -d "MLProject/mlartifacts" ]; then git add -f MLProject/mlartifacts; fi
          git status
          git diff --staged --quiet || git commit -m "CI: automated training run [skip ci]"
          git push

      - name: Build Docker Model
        working-directory: MLProject
        run: |
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "california-housing-model" --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag california-housing-model ${{ secrets.DOCKER_HUB_USERNAME }}/california-housing-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/california-housing-model:latest